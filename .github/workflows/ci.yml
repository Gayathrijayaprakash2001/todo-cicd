name: CI - Docker Build & Push

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Debug – MUST show lengths > 0 after direct push
      - name: Debug secret lengths
        run: |
          echo "Username length = ${#U_CHECK}"
          echo "Password length  = ${#P_CHECK}"
        env:
          U_CHECK: ${{ secrets.DOCKER_USERNAME }}   # any case works
          P_CHECK: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t tesseris/todo-cicd:latest .

      - name: Push image
        run: docker push tesseris/todo-cicd:latest