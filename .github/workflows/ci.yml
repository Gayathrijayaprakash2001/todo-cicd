name: CI Pipeline - Docker Build & Push

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Debug: This MUST show non-zero lengths after direct push
      - name: Debug - Secret Availability
        run: |
          echo "DOCKER_USERNAME length = ${#DOCKER_USERNAME_CHECK}"
          echo "DOCKER_PASSWORD length = ${#DOCKER_PASSWORD_CHECK}"
        env:
          DOCKER_USERNAME_CHECK: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD_CHECK: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: true   # optional, but fine to keep

      - name: Build Docker Image
        run: docker build -t tesseris/todo-cicd:latest .

      - name: Push Docker Image
        run: docker push tesseris/todo-cicd:latest