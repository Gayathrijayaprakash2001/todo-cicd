name: CI - Build & Push Docker

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - Secrets Check (must be non-zero on direct push)
        run: |
          echo "DOCKER_USERNAME length = ${#U}"
          echo "DOCKER_PASSWORD length = ${#P}"
        env:
          U: ${{ secrets.DOCKER_USERNAME }}
          P: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: true  # optional

      - name: Build
        run: docker build -t tesseris/todo-cicd:latest .

      - name: Push
        run: docker push tesseris/todo-cicd:latest