name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug secrets lengths
        run: |
          echo "DOCKER_USERNAME length: ${#DOCKER_USERNAME_CHECK}"
          echo "DOCKER_PASSWORD length: ${#DOCKER_PASSWORD_CHECK}"
        env:
          DOCKER_USERNAME_CHECK: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD_CHECK: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-cicd:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/todo-cicd:latest