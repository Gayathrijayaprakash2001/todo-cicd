name: CI Pipeline

# Trigger the workflow on push or PR to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python (if you need it for your app)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      # Step 3: Install Python dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Test Docker secrets (optional, safe for debugging)
      - name: Test Docker secrets
        run: echo "Docker username is ${{ secrets.docker_username }}"

      # Step 5: Login to Docker Hub using secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_password }}

      # Step 6: Build Docker image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.docker_username }}/todo-cicd:latest .

      # Step 7: Push Docker image to Docker Hub
      - name: Push Docker Image
        run: docker push ${{ secrets.docker_username }}/todo-cicd:latest