name: CI Pipeline - Build & Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5   # updated to latest version
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Temporary debug step ──
      - name: Debug - Check if secrets are available
        run: |
          echo "DOCKER_USERNAME length = ${#DOCKER_USERNAME_CHECK}"
          echo "DOCKER_PASSWORD length = ${#DOCKER_PASSWORD_CHECK}"
          # The lines below are optional - they show masked values (***)
          echo "DOCKER_USERNAME = $DOCKER_USERNAME_CHECK"
          echo "DOCKER_PASSWORD = $DOCKER_PASSWORD_CHECK"
        env:
          DOCKER_USERNAME_CHECK: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD_CHECK: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-cicd:latest .

      - name: Push Docker image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/todo-cicd:latest